---
- name: Detect target user and hardware
  hosts: localhost
  connection: local
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: Install required Ansible collections
      ansible.builtin.command: >
        ansible-galaxy collection install
        --requirements-file {{ setup_dir }}/requirements.yml
      changed_when: false

    - name: Detect target user
      ansible.builtin.command: >
        awk -F: '$3 >= 1000 && $3 < 65534 { print $1; exit }' /etc/passwd
      register: _target_user
      changed_when: false

    - name: Detect target home directory
      ansible.builtin.command: "getent passwd {{ _target_user.stdout }}"
      register: _target_passwd
      changed_when: false

    - name: Set target_user and target_home facts
      ansible.builtin.set_fact:
        target_user: "{{ _target_user.stdout }}"
        target_home: "{{ _target_passwd.stdout.split(':')[5] }}"

  roles:
    - machine_facts


- name: System configuration
  hosts: localhost
  connection: local
  gather_facts: no
  become: yes

  roles:
    - system
    - hardware


- name: User configuration
  hosts: localhost
  connection: local
  gather_facts: no
  become: yes
  become_method: su
  become_user: "{{ target_user }}"

  roles:
    - dotfiles
    - aur
    - desktop

  post_tasks:
    - name: Mark setup complete
      ansible.builtin.file:
        path: /etc/endeavour-setup-complete
        state: touch
        mode: '0644'
      become: yes
      become_user: root

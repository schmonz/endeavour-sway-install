---
# Enable zswap for machines with limited RAM.
# Targets GRUB_CMDLINE_LINUX_DEFAULT — performance optimization, not needed in recovery.
- name: Enable zswap in GRUB
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?!.*zswap.enabled=1).*)(")\s*$'
    replace: '\1 zswap.enabled=1 zswap.compressor=zstd zswap.zpool=z3fold zswap.max_pool_percent=20\2'
  notify: rebuild grub

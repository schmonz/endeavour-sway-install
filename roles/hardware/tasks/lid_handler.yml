---
# Chromebook: kernel doesn't emit lid input events, so use a sysfs poller instead.
- name: Create ~/.local/bin and ~/.config/systemd/user directories
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - .local/bin
    - .config/systemd/user
    - .config/systemd/user/graphical-session.target.wants
  become: true
  become_user: "{{ target_user }}"

- name: Install gatherd-handle-lid script
  ansible.builtin.copy:
    src: "{{ setup_dir }}/scripts/gatherd-handle-lid"
    dest: "{{ target_home }}/.local/bin/gatherd-handle-lid"
    mode: '0755'
    remote_src: true
  become: true
  become_user: "{{ target_user }}"

- name: Write gatherd-handle-lid systemd user service
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/systemd/user/gatherd-handle-lid.service"
    content: |
      [Unit]
      Description=Sway lid-close handler (sysfs ACPI poller)
      PartOf=graphical-session.target

      [Service]
      Type=simple
      ExecStart={{ target_home }}/.local/bin/gatherd-handle-lid
      Restart=on-failure
      RestartSec=1

      [Install]
      WantedBy=graphical-session.target
    mode: '0644'
  become: true
  become_user: "{{ target_user }}"

- name: Enable gatherd-handle-lid user service
  ansible.builtin.file:
    path: "{{ target_home }}/.config/systemd/user/graphical-session.target.wants/gatherd-handle-lid.service"
    src: ../gatherd-handle-lid.service
    state: link
  become: true
  become_user: "{{ target_user }}"

- name: Add gatherd-handle-lid autostart entry
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.config/sway/config.d/autostart_applications"
    line: "exec systemctl --user start gatherd-handle-lid.service"
  become: true
  become_user: "{{ target_user }}"

---
- name: Create environment.d directory
  ansible.builtin.file:
    path: "{{ target_home }}/.config/environment.d"
    state: directory
    mode: '0755'
  become_user: "{{ target_user }}"

- name: Force software GL rendering for legacy GPU
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/environment.d/50-softgl.conf"
    content: "LIBGL_ALWAYS_SOFTWARE=1\n"
    mode: '0644'
  become_user: "{{ target_user }}"

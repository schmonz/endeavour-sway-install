---
- name: Install mbpfan
  kewlfft.aur.aur:
    name: mbpfan
    use: yay
    state: present
  become: true
  become_user: "{{ target_user }}"

- name: Install mbpfan service override
  ansible.builtin.copy:
    src: /usr/lib/systemd/system/mbpfan.service
    dest: /etc/systemd/system/mbpfan.service
    remote_src: true
    mode: '0644'

- name: Enable mbpfan
  ansible.builtin.systemd:
    name: mbpfan
    enabled: true
    state: started
    daemon_reload: true

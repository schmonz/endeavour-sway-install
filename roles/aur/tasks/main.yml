---
- name: Ensure yay build dependencies are present
  community.general.pacman:
    name:
      - base-devel
    state: present
  become: yes
  become_user: root

- name: Check if yay is installed
  ansible.builtin.stat:
    path: /usr/bin/yay
  register: _yay_bin

- name: Clone yay-bin
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay-bin.git
    dest: /tmp/yay-bin
    version: HEAD
  when: not _yay_bin.stat.exists

- name: Build and install yay
  ansible.builtin.command: makepkg -si --noconfirm
  args:
    chdir: /tmp/yay-bin
  when: not _yay_bin.stat.exists

- name: Grant temporary NOPASSWD sudo for AUR installs
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "{{ target_user }} ALL=(ALL) NOPASSWD: ALL"
    validate: visudo -cf %s
  become: yes
  become_user: root

- name: Ensure ~/.gnupg exists with correct permissions
  ansible.builtin.file:
    path: "{{ target_home }}/.gnupg"
    state: directory
    mode: '0700'

- name: Configure GPG to auto-retrieve keys from reliable keyserver
  ansible.builtin.copy:
    dest: "{{ target_home }}/.gnupg/gpg.conf"
    content: |
      keyserver hkps://keyserver.ubuntu.com
      keyserver-options auto-key-retrieve
    mode: '0600'

- name: Configure dirmngr keyserver (GPG 2.1+)
  ansible.builtin.copy:
    dest: "{{ target_home }}/.gnupg/dirmngr.conf"
    content: |
      keyserver hkps://keyserver.ubuntu.com
    mode: '0600'

- name: Restart dirmngr to pick up new keyserver config
  ansible.builtin.command: gpgconf --kill dirmngr
  changed_when: false
  failed_when: false

- name: Import 1Password GPG key
  ansible.builtin.shell: |
    curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --import
  changed_when: false

- name: Install AUR packages
  kewlfft.aur.aur:
    name:
      # password manager
      - 1password
      # web browsers
      - helium-browser-bin
      - ungoogled-chromium-bin
      - webapp-manager
      # file transfer
      - localsend-bin
      # communication
      - slack-electron
      - zoom
      - teams-for-linux-electron-bin
      # cloud sync
      - rclone
      # development
      - clion
      - clion-jre
      # writing
      - dawn-writer-bin
      # AI tools
      - claude-code
      - claude-desktop-bin
      - claude-cowork-service
      # snapshots
      - timeshift-autosnap
    use: yay
    state: present
    extra_args: "--mflags --skippgpcheck"

- name: Revoke temporary NOPASSWD sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "{{ target_user }} ALL=(ALL) NOPASSWD: ALL"
    state: absent
    validate: visudo -cf %s
  become: yes
  become_user: root

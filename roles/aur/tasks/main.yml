---
- name: Ensure yay build dependencies are present
  community.general.pacman:
    name:
      - base-devel
    state: present
  become: yes
  become_user: root

- name: Check if yay is installed
  ansible.builtin.stat:
    path: /usr/bin/yay
  register: _yay_bin

- name: Clone yay-bin
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay-bin.git
    dest: /tmp/yay-bin
    version: HEAD
  when: not _yay_bin.stat.exists

- name: Build and install yay
  ansible.builtin.command: makepkg -si --noconfirm
  args:
    chdir: /tmp/yay-bin
  when: not _yay_bin.stat.exists

- name: Import 1Password GPG key
  ansible.builtin.shell: |
    curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --import
  become_user: "{{ target_user }}"
  changed_when: false

- name: Install AUR packages
  kewlfft.aur.aur:
    name:
      # password manager
      - 1password
      # web browsers
      - helium-browser-bin
      - ungoogled-chromium-bin
      - webapp-manager
      # file transfer
      - localsend-bin
      # communication
      - slack-electron
      - zoom
      - teams-for-linux-electron-bin
      # cloud sync
      - rclone
      # development
      - clion
      - clion-jre
      # writing
      - dawn-writer-bin
      # AI tools
      - claude-code
      - claude-desktop-bin
      - claude-cowork-service
      # snapshots
      - timeshift-autosnap
    use: yay
    state: present
